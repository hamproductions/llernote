name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/composite-actions/setup
      - run: bun lint
      - run: bun run type-check
      - run: bunx vitest run
      - run: bun run ci:build
